{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <h2>Physical Events & Missions</h2>
    <div class="row mt-4">
        {% for event in events %}
        <div class="col-md-4">
            <div class="card p-3 shadow-sm mb-4">
                <h4>{{ event.title }}</h4>
                <p>{{ event.description }}</p>
                <span class="badge bg-success mb-3">Rewards: {{ event.max_points }} XP</span>
                
                <form action="" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="hidden" name="event_id" value="{{ event.id }}">
                    <label>Upload Photo Proof:</label>
                    {{ form.proof_image }}
                    <button type="submit" class="btn btn-primary mt-3 w-100">Submit Image</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
