{% extends 'base.html' %}

{% block title %}Login | EcoQuest{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-16 flex justify-center items-center min-h-[75vh]">
    <div class="card w-full max-w-md shadow-lg border border-gray-200 rounded-xl bg-white p-8">
        <h2 class="text-center text-3xl font-bold text-[#1b4332] mb-8 tracking-tight">System Login</h2>
        
        {% if form.errors %}
        <div class="alert alert-danger bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-6">
            Invalid email or password. Please try again.
        </div>
        {% endif %}
        
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="form-group">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <input type="email" name="username" required placeholder="Enter your email" value="{{ request.POST.username }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-[#1b4332] focus:border-transparent transition bg-white">
            </div>
            
            <div class="form-group">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required placeholder="Enter your password"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-[#1b4332] focus:border-transparent transition bg-white">
            </div>
            
            <div class="pt-2">
                <button type="submit" class="w-full bg-[#1b4332] text-white font-bold py-3 px-4 rounded hover:bg-[#143628] transition shadow-md border border-[#1b4332]">
                    Login to Dashboard
                </button>
            </div>
        </form>
        
        <div class="mt-8 text-center pt-6 border-t border-gray-100">
            <p class="text-gray-600 text-sm m-0">
                Don't have an account? 
                <a href="{% url 'register' %}" class="text-[#1b4332] font-bold hover:underline transition">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
